<!DOCTYPE html>
<html lang="en">
<head>
    <title>অ্যাডমিন প্যানেল</title>
    <style>
        body { padding: 20px; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; border: 1px solid #ddd; padding: 15px; }
    </style>
</head>
<body>
    <h1>তেলের স্টক আপডেট করুন</h1>
    <div class="form-group">
        <input type="text" id="oilName" placeholder="তেলের নাম (যেমন: সরিষার তেল)">
        <input type="number" id="oilPrice" placeholder="প্রতি লিটার দাম">
        <button onclick="updatePrice()">আপডেট করুন</button>
    </div>

    <script type="module">
        import { db } from './config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.updatePrice = async () => {
            const name = document.getElementById('oilName').value;
            const price = document.getElementById('oilPrice').value;
            try {
                await setDoc(doc(db, "products", name), { price: price, lastUpdate: new Date() });
                alert("দাম আপডেট হয়েছে!");
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
